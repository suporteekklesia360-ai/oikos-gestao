<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kairós Admin — Painel de Controle</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8C97A;--gold-dark:#8B6914;--bg:#0A0F1A;--bg2:#0F1624;--bg3:#161F30;--bg4:#1E2A3D;--white:#F0EBE1;--white2:#D4CDBF;--muted:#6B7D96;--success:#3DB87A;--danger:#E05252;--border:rgba(201,168,76,0.1);--brd2:rgba(255,255,255,0.06)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%;background:var(--bg);color:var(--white);font-family:'Jost',sans-serif;font-weight:300}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
.login-screen::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(201,168,76,0.08) 0%,transparent 60%);pointer-events:none}
.login-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(201,168,76,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.02) 1px,transparent 1px);background-size:56px 56px;pointer-events:none}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:40px 32px;width:100%;max-width:380px;position:relative;z-index:2}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo svg{width:56px;height:56px;filter:drop-shadow(0 0 16px rgba(201,168,76,0.3));margin-bottom:12px}
.login-nome{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--white);letter-spacing:0.08em}
.login-nome span{color:var(--gold)}
.login-sub{font-size:9px;letter-spacing:0.4em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.login-label{display:block;font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.login-input{width:100%;background:var(--bg3);border:1px solid var(--brd2);border-radius:8px;padding:13px 14px;color:var(--white);font-family:'Jost',sans-serif;font-size:14px;font-weight:300;outline:none;transition:border-color 0.2s;margin-bottom:14px;-webkit-appearance:none}
.login-input:focus{border-color:rgba(201,168,76,0.4)}
.login-btn{width:100%;background:var(--gold);color:var(--bg);border:none;border-radius:8px;padding:14px;font-family:'Jost',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;margin-top:4px}
.login-btn:hover{background:var(--gold-light)}
.login-erro{font-size:11px;color:var(--danger);text-align:center;margin-top:10px;min-height:16px}

/* ADMIN */
.admin{display:none;min-height:100vh;flex-direction:column}
.admin.active{display:flex}

/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:100}
.topbar-logo{display:flex;align-items:center;gap:10px}
.topbar-logo svg{width:26px;height:26px}
.topbar-nome{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;letter-spacing:0.08em}
.topbar-nome span{color:var(--gold)}
.topbar-badge{font-size:8px;letter-spacing:0.3em;text-transform:uppercase;background:rgba(201,168,76,0.1);border:1px solid var(--border);color:var(--gold);padding:4px 12px;border-radius:20px}
.topbar-right{display:flex;align-items:center;gap:12px}
.btn-sair{background:none;border:1px solid var(--brd2);color:var(--muted);padding:7px 16px;border-radius:6px;font-family:'Jost',sans-serif;font-size:11px;cursor:pointer;transition:all 0.2s}
.btn-sair:hover{border-color:var(--danger);color:var(--danger)}

/* MAIN */
.admin-main{flex:1;padding:28px;max-width:1100px;margin:0 auto;width:100%}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px;text-align:center}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;line-height:1;margin-bottom:6px}
.stat-num.gold{color:var(--gold)}
.stat-num.green{color:var(--success)}
.stat-num.red{color:var(--danger)}
.stat-lbl{font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted)}

/* SECTION */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:gap}
.section-titulo{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--white)}
.btn-novo{display:flex;align-items:center;gap:8px;background:var(--gold);color:var(--bg);border:none;border-radius:6px;padding:10px 18px;font-family:'Jost',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:background 0.2s}
.btn-novo:hover{background:var(--gold-light)}

/* BUSCA */
.busca-wrap{margin-bottom:14px}
.busca-input{width:100%;background:var(--bg2);border:1px solid var(--brd2);border-radius:8px;padding:11px 16px;color:var(--white);font-family:'Jost',sans-serif;font-size:13px;font-weight:300;outline:none;transition:border-color 0.2s}
.busca-input:focus{border-color:rgba(201,168,76,0.3)}
.busca-input::placeholder{color:var(--muted)}

/* TABELA */
.tabela-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.tabela{width:100%;border-collapse:collapse}
.tabela th{background:var(--bg3);padding:12px 16px;text-align:left;font-size:8px;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold);font-weight:500;border-bottom:1px solid var(--border)}
.tabela td{padding:13px 16px;font-size:13px;color:var(--white2);border-bottom:1px solid var(--brd2)}
.tabela tr:last-child td{border-bottom:none}
.tabela tr:hover td{background:rgba(255,255,255,0.02)}
.tabela-email{font-weight:400;color:var(--white)}
.tabela-nome{font-size:11px;color:var(--muted);margin-top:2px}

/* BADGE STATUS */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:0.05em}
.badge.ativo{background:rgba(61,184,122,0.12);border:1px solid rgba(61,184,122,0.25);color:var(--success)}
.badge.inativo{background:rgba(224,82,82,0.1);border:1px solid rgba(224,82,82,0.2);color:var(--danger)}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}

/* AÇÕES */
.acoes{display:flex;gap:6px}
.btn-acao{background:none;border:1px solid var(--brd2);color:var(--muted);padding:5px 10px;border-radius:5px;font-family:'Jost',sans-serif;font-size:11px;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.btn-acao.ativar:hover{border-color:var(--success);color:var(--success);background:rgba(61,184,122,0.08)}
.btn-acao.desativar:hover{border-color:var(--danger);color:var(--danger);background:rgba(224,82,82,0.08)}
.btn-acao.excluir:hover{border-color:var(--danger);color:var(--danger);background:rgba(224,82,82,0.08)}

/* VAZIO */
.tabela-vazio{text-align:center;padding:48px;color:var(--muted)}
.tabela-vazio-ico{font-size:32px;margin-bottom:10px;opacity:0.3}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(10,15,26,0.88);backdrop-filter:blur(6px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-ov.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:32px 28px;width:100%;max-width:460px;animation:popUp 0.25s ease}
@keyframes popUp{from{opacity:0;transform:scale(0.95) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-titulo{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--white);margin-bottom:22px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.form-input,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--brd2);border-radius:6px;padding:12px 14px;color:var(--white);font-family:'Jost',sans-serif;font-size:13px;font-weight:300;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
.form-input:focus,.form-textarea:focus{border-color:rgba(201,168,76,0.4)}
.form-textarea{resize:vertical;min-height:80px}
.modal-btns{display:flex;gap:10px;margin-top:8px}
.btn-cancelar{flex:1;background:var(--bg3);border:1px solid var(--brd2);color:var(--muted);border-radius:6px;padding:12px;font-family:'Jost',sans-serif;font-size:12px;cursor:pointer;transition:background 0.2s}
.btn-cancelar:hover{background:var(--bg4)}
.btn-confirmar{flex:2;background:var(--gold);border:none;color:var(--bg);border-radius:6px;padding:12px;font-family:'Jost',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:background 0.2s}
.btn-confirmar:hover{background:var(--gold-light)}
.btn-confirmar:disabled{opacity:0.5;cursor:not-allowed}

/* CONFIRM */
.confirm-ov{position:fixed;inset:0;background:rgba(10,15,26,0.9);backdrop-filter:blur(6px);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.confirm-ov.open{display:flex}
.confirm-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:28px 24px;width:100%;max-width:300px;text-align:center;animation:popUp 0.25s ease}
.c-ico{font-size:32px;margin-bottom:10px}
.c-tit{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--white);margin-bottom:7px}
.c-msg{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:20px}
.c-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.c-nao{background:var(--bg3);border:1px solid var(--brd2);color:var(--muted);border-radius:7px;padding:11px;font-family:'Jost',sans-serif;font-size:12px;cursor:pointer}
.c-sim{background:var(--danger);border:none;color:white;border-radius:7px;padding:11px;font-family:'Jost',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.c-sim.gold{background:var(--gold);color:var(--bg)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--bg3);border:1px solid var(--gold);color:var(--white);padding:10px 22px;border-radius:24px;font-size:12px;opacity:0;transition:all 0.3s;z-index:500;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--muted)}
.loading-ring{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* MOBILE */
@media(max-width:700px){
  .admin-main{padding:16px}
  .topbar{padding:12px 16px}
  .tabela th:nth-child(3),.tabela td:nth-child(3),.tabela th:nth-child(4),.tabela td:nth-child(4){display:none}
  .acoes{flex-direction:column}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-grid"></div>
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 120 120" fill="none">
        <circle cx="60" cy="60" r="54" stroke="#C9A84C" stroke-width="1" stroke-dasharray="4 6" opacity="0.4"/>
        <circle cx="60" cy="60" r="42" stroke="#C9A84C" stroke-width="0.5" opacity="0.2"/>
        <line x1="36" y1="22" x2="36" y2="98" stroke="#F0EBE1" stroke-width="4" stroke-linecap="round"/>
        <line x1="36" y1="60" x2="72" y2="22" stroke="#F0EBE1" stroke-width="4" stroke-linecap="round"/>
        <line x1="36" y1="60" x2="78" y2="98" stroke="#F0EBE1" stroke-width="4" stroke-linecap="round"/>
        <circle cx="36" cy="60" r="5" fill="#C9A84C"/>
      </svg>
      <p class="login-nome">Kair<span>ó</span>s Admin</p>
      <p class="login-sub">Painel de controle</p>
    </div>
    <label class="login-label">Senha de administrador</label>
    <input type="password" class="login-input" id="adminSenha" placeholder="••••••••" onkeydown="if(event.key==='Enter')fazerLogin()">
    <button class="login-btn" onclick="fazerLogin()">Acessar painel →</button>
    <p class="login-erro" id="loginErro"></p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin" id="adminPanel">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-logo">
      <svg viewBox="0 0 32 32" fill="none" width="26" height="26">
        <circle cx="16" cy="16" r="14" stroke="#C9A84C" stroke-width="0.8" stroke-dasharray="3 4" opacity="0.5"/>
        <line x1="9" y1="5" x2="9" y2="27" stroke="#F0EBE1" stroke-width="2" stroke-linecap="round"/>
        <line x1="9" y1="16" x2="20" y2="5" stroke="#F0EBE1" stroke-width="2" stroke-linecap="round"/>
        <line x1="9" y1="16" x2="22" y2="27" stroke="#F0EBE1" stroke-width="2" stroke-linecap="round"/>
        <circle cx="9" cy="16" r="2" fill="#C9A84C"/>
      </svg>
      <span class="topbar-nome">Kair<span>ó</span>s</span>
    </div>
    <span class="topbar-badge">Painel Admin</span>
    <div class="topbar-right">
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
  </div>

  <div class="admin-main">

    <!-- STATS -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-num gold" id="statTotal">—</div><div class="stat-lbl">Total de licenças</div></div>
      <div class="stat-card"><div class="stat-num green" id="statAtivos">—</div><div class="stat-lbl">Ativos</div></div>
      <div class="stat-card"><div class="stat-num red" id="statInativos">—</div><div class="stat-lbl">Bloqueados</div></div>
      <div class="stat-card"><div class="stat-num gold" id="statHoje">—</div><div class="stat-lbl">Adicionados hoje</div></div>
    </div>

    <!-- CLIENTES -->
    <div class="section-head" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap">
      <span class="section-titulo">Licenças — Oikos Gestão</span>
      <button class="btn-novo" onclick="abrirModal()">+ Nova licença</button>
    </div>

    <div class="busca-wrap">
      <input type="text" class="busca-input" id="buscaInput" placeholder="🔍 Buscar por e-mail ou nome..." oninput="filtrar()">
    </div>

    <div class="tabela-wrap">
      <div id="tabelaContent">
        <div class="loading"><div class="loading-ring"></div><p style="font-size:12px">Carregando...</p></div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL NOVA LICENÇA -->
<div class="modal-ov" id="modalLicenca">
  <div class="modal-box">
    <p class="modal-titulo" id="modalTitulo">Nova licença</p>
    <div class="form-group">
      <label class="form-label">E-mail do cliente *</label>
      <input type="email" class="form-input" id="novoEmail" placeholder="cliente@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Nome do cliente</label>
      <input type="text" class="form-input" id="novoNome" placeholder="Nome para controle interno">
    </div>
    <div class="form-group">
      <label class="form-label">Observação (opcional)</label>
      <textarea class="form-textarea" id="novaObs" placeholder="Ex: Comprou via PIX em 10/01, pacote completo..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
      <button class="btn-confirmar" id="btnConfirmar" onclick="salvarLicenca()">Liberar acesso →</button>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-ov" id="confirmOv">
  <div class="confirm-box">
    <div class="c-ico" id="cIco">⚠️</div>
    <div class="c-tit" id="cTit">Confirmar</div>
    <div class="c-msg" id="cMsg">Tem certeza?</div>
    <div class="c-btns">
      <button class="c-nao" onclick="fecharConfirm()">Cancelar</button>
      <button class="c-sim" id="cSim" onclick="execConfirm()">Confirmar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const SUPA_URL='https://lnjbihevhovndsijyny.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxuamJpaGV2aG92bmRzaWp5bnl5Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODc4MTI5MCwiZXhwIjoyMDk0MzU3MjkwfQ.tDucOohZVxKNlf1w18nMWH-DbAMfd8jqi18J3oK9xnE';

const HEADERS = {
  'Content-Type': 'application/json',
  'apikey': SUPA_KEY,
  'Authorization': 'Bearer ' + SUPA_KEY,
  'Prefer': 'return=representation'
};

async function dbGet(path) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, { headers: HEADERS });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function dbPost(path, body) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
    method: 'POST', headers: HEADERS, body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function dbPatch(path, body) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
    method: 'PATCH', headers: { ...HEADERS, 'Prefer': 'return=minimal' }, body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
}

async function dbDelete(path) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
    method: 'DELETE', headers: HEADERS
  });
  if (!r.ok) throw new Error(await r.text());
}

// ── SENHA ADMIN (mude para a sua senha) ──
const ADMIN_SENHA = 'kairos@admin2025';

let emails=[];
let emailsFiltrados=[];
let _cb=null;

// ── LOGIN ──
function fazerLogin(){
  const senha=document.getElementById('adminSenha').value;
  const erroEl=document.getElementById('loginErro');
  if(senha===ADMIN_SENHA){
    sessionStorage.setItem('kairos_admin','1');
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminPanel').classList.add('active');
    carregarEmails();
  }else{
    erroEl.textContent='Senha incorreta.';
    document.getElementById('adminSenha').value='';
  }
}

function sair(){
  sessionStorage.removeItem('kairos_admin');
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('adminPanel').classList.remove('active');
  document.getElementById('adminSenha').value='';
}

// ── CARREGAR ──
async function carregarEmails(){
  document.getElementById('tabelaContent').innerHTML=`<div class="loading"><div class="loading-ring"></div><p style="font-size:12px">Carregando...</p></div>`;
  try {
    const data = await dbGet('emails_autorizados?select=*&order=created_at.desc');
    emails = data || [];
    emailsFiltrados = [...emails];
    atualizarStats();
    renderTabela();
  } catch(e) {
    document.getElementById('tabelaContent').innerHTML=`<div class="loading"><p style="color:var(--danger)">Erro ao carregar: ${e.message}</p></div>`;
  }
}

function atualizarStats(){
  const total=emails.length;
  const ativos=emails.filter(e=>e.ativo).length;
  const inativos=emails.filter(e=>!e.ativo).length;
  const hoje=new Date().toISOString().split('T')[0];
  const addHoje=emails.filter(e=>e.created_at&&e.created_at.startsWith(hoje)).length;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statAtivos').textContent=ativos;
  document.getElementById('statInativos').textContent=inativos;
  document.getElementById('statHoje').textContent=addHoje;
}

function filtrar(){
  const q=document.getElementById('buscaInput').value.toLowerCase().trim();
  emailsFiltrados=q?emails.filter(e=>(e.email||'').toLowerCase().includes(q)||(e.nome_cliente||'').toLowerCase().includes(q)):emails;
  renderTabela();
}

function renderTabela(){
  if(emailsFiltrados.length===0){
    document.getElementById('tabelaContent').innerHTML=`<div class="tabela-vazio"><div class="tabela-vazio-ico">📋</div><p style="font-size:13px">${emails.length===0?'Nenhuma licença cadastrada ainda.<br>Clique em "+ Nova licença" para começar.':'Nenhum resultado encontrado.'}</p></div>`;
    return;
  }
  document.getElementById('tabelaContent').innerHTML=`
    <table class="tabela">
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Status</th>
          <th>Data</th>
          <th>Observação</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        ${emailsFiltrados.map(e=>`
          <tr>
            <td>
              <div class="tabela-email">${e.email}</div>
              ${e.nome_cliente?`<div class="tabela-nome">${e.nome_cliente}</div>`:''}
            </td>
            <td><span class="badge ${e.ativo?'ativo':'inativo'}">${e.ativo?'Ativo':'Bloqueado'}</span></td>
            <td style="font-size:11px;color:var(--muted)">${e.data_compra?formatarData(e.data_compra):'—'}</td>
            <td style="font-size:11px;color:var(--muted);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.observacao||'—'}</td>
            <td>
              <div class="acoes">
                ${e.ativo
                  ?`<button class="btn-acao desativar" onclick="toggleEmail(${e.id},false,'${e.email}')">Bloquear</button>`
                  :`<button class="btn-acao ativar" onclick="toggleEmail(${e.id},true,'${e.email}')">Ativar</button>`
                }
                <button class="btn-acao excluir" onclick="excluirEmail(${e.id},'${e.email}')">Excluir</button>
              </div>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
}

function formatarData(d){
  if(!d)return'—';
  const[y,m,dia]=d.split('-');
  return`${dia}/${m}/${y}`;
}

// ── MODAL ──
function abrirModal(){
  document.getElementById('novoEmail').value='';
  document.getElementById('novoNome').value='';
  document.getElementById('novaObs').value='';
  document.getElementById('modalTitulo').textContent='Nova licença';
  document.getElementById('btnConfirmar').textContent='Liberar acesso →';
  document.getElementById('btnConfirmar').disabled=false;
  document.getElementById('modalLicenca').classList.add('open');
  setTimeout(()=>document.getElementById('novoEmail').focus(),200);
}

function fecharModal(){document.getElementById('modalLicenca').classList.remove('open');}

async function salvarLicenca(){
  const email=document.getElementById('novoEmail').value.trim().toLowerCase();
  const nome=document.getElementById('novoNome').value.trim();
  const obs=document.getElementById('novaObs').value.trim();
  const btn=document.getElementById('btnConfirmar');
  if(!email||!email.includes('@')){toast('Informe um e-mail válido');return;}
  btn.disabled=true;btn.textContent='Salvando...';
  try {
    await dbPost('emails_autorizados', {
      email, nome_cliente: nome||null, observacao: obs||null, ativo: true
    });
    fecharModal();
    await carregarEmails();
    toast(`✓ Acesso liberado para ${email}!`);
  } catch(e) {
    toast('Erro: '+e.message);
    btn.disabled=false;btn.textContent='Liberar acesso →';
  }
}

// ── TOGGLE ──
function toggleEmail(id,ativar,email){
  confirmar(
    ativar?'✅':'🔒',
    ativar?'Ativar acesso':'Bloquear acesso',
    ativar?`Ativar acesso de ${email}?`:`Bloquear acesso de ${email}? O cliente não conseguirá mais entrar.`,
    !ativar,
    async()=>{
      try {
        await dbPatch(`emails_autorizados?id=eq.${id}`,{ativo:ativar});
        await carregarEmails();
        toast(ativar?`✓ Acesso de ${email} ativado!`:`✓ Acesso de ${email} bloqueado.`);
      } catch(e){toast('Erro: '+e.message);}
    }
  );
}

// ── EXCLUIR ──
function excluirEmail(id,email){
  confirmar('🗑️','Excluir licença',`Remover permanentemente o acesso de ${email}?`,true,async()=>{
    try {
      await dbDelete(`emails_autorizados?id=eq.${id}`);
      await carregarEmails();
      toast(`✓ Licença de ${email} removida.`);
    } catch(e){toast('Erro: '+e.message);}
  });
}

// ── CONFIRM ──
function confirmar(ico,tit,msg,danger,cb){
  document.getElementById('cIco').textContent=ico;
  document.getElementById('cTit').textContent=tit;
  document.getElementById('cMsg').textContent=msg;
  const btn=document.getElementById('cSim');
  btn.className='c-sim'+(danger?'':' gold');
  btn.textContent=danger?'Confirmar':'Sim';
  _cb=cb;
  document.getElementById('confirmOv').classList.add('open');
}
function fecharConfirm(){document.getElementById('confirmOv').classList.remove('open');_cb=null;}
function execConfirm(){fecharConfirm();if(_cb)_cb();}

// ── TOAST ──
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── FECHAR MODAIS ──
document.getElementById('modalLicenca').addEventListener('click',e=>{if(e.target===e.currentTarget)fecharModal();});
document.getElementById('confirmOv').addEventListener('click',e=>{if(e.target===e.currentTarget)fecharConfirm();});

// ── INIT ──
if(sessionStorage.getItem('kairos_admin')==='1'){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('adminPanel').classList.add('active');
  carregarEmails();
}
</script>
</body>
</html>
